<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Dev musings and write-ups."><title>DevLog | CeleDev97</title><link rel="icon" type="image/png" href="/img/celedev97.png"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css"><link rel="stylesheet" href="/_astro/_slug_.ChLNNKwH.css"></head> <body> <header> <a href="/" class="header-brand"> <span class="prompt-user">root</span> <span class="prompt-at">@</span> <span class="prompt-host">cele.dev</span> <span class="prompt-path">:~</span> <span class="prompt-dollar">$</span> <span class="cursor"></span> </a> <nav> <a href="/devlog" aria-current="page">devlog</a> <a href="/about-me">about</a> </nav> </header> <main>  <div class="terminal-block"> <div class="cmd-line">ls -la /devlog/</div> <div class="terminal-output"> <div> <p class="ls-total">total 2</p> <div class="ls-entry"> <span class="ls-date">May 16, 2026</span> <div class="ls-info"> <div class="ls-name"> <a href="/devlog/writing_code_in_the_llm_era">writing_code_in_the_llm_era/</a> </div> <div class="ls-desc">Writing Code in the LLM Era — are we still programmers?</div> <div class="ls-tags"> <span class="tag">llm</span><span class="tag">ai</span><span class="tag">coding</span> </div> </div> </div><div class="ls-entry"> <span class="ls-date">Jul 17, 2020</span> <div class="ls-info"> <div class="ls-name"> <a href="/devlog/kotlin_pill_1">kotlin_pill_1/</a> </div> <div class="ls-desc">Kotlin&#39;s pills #1 properties introduction</div> <div class="ls-tags"> <span class="tag">kotlin</span><span class="tag">kotlin_pills</span> </div> </div> </div> </div> </div> </div>  </main> <footer> <span>© 2026 CeleDev97</span> </footer> <script>
    document.addEventListener('DOMContentLoaded', () => {
      const TYPE_DURATION = 300; // ms total per command, regardless of length
      const AFTER_CMD_DELAY = 200;
      const BETWEEN_BLOCKS_DELAY = 300;

      const blocks = Array.from(document.querySelectorAll('.terminal-block'));
      if (!blocks.length) return;

      blocks.forEach(block => {
        const cmd = block.querySelector('.cmd-line, .home-prompt');
        const output = block.querySelector('.terminal-output');
        if (cmd) { cmd.dataset.text = cmd.textContent; cmd.textContent = ''; }
        if (output) output.style.visibility = 'hidden';
      });

      function typeCmd(cmd, done) {
        const text = cmd.dataset.text;
        const delay = Math.max(15, Math.round(TYPE_DURATION / text.length));
        let i = 0;
        cmd.classList.add('typing');
        const id = setInterval(() => {
          cmd.textContent = text.slice(0, ++i);
          if (i >= text.length) {
            clearInterval(id);
            cmd.classList.remove('typing');
            setTimeout(done, AFTER_CMD_DELAY);
          }
        }, delay);
      }

      function runBlock(index) {
        if (index >= blocks.length) return;
        const block = blocks[index];
        const cmd = block.querySelector('.cmd-line, .home-prompt');
        const output = block.querySelector('.terminal-output');
        if (!cmd) { runBlock(index + 1); return; }
        typeCmd(cmd, () => {
          if (output) output.style.visibility = 'visible';
          setTimeout(() => runBlock(index + 1), BETWEEN_BLOCKS_DELAY);
        });
      }

      setTimeout(() => runBlock(0), 200);
    });
  </script> </body> </html>
